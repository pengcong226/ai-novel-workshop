<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>数据库修复工具</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        h1 {
            color: #667eea;
            margin-bottom: 30px;
        }
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 5px;
            font-size: 16px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            margin: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .steps {
            text-align: left;
            margin: 20px 0;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 5px;
        }
        .steps ol {
            margin: 0;
            padding-left: 20px;
        }
        .steps li {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 数据库修复工具</h1>

        <div id="status" class="status info">
            点击下方按钮开始修复
        </div>

        <button id="fixButton" onclick="fixDatabase()">
            开始修复
        </button>

        <button id="checkButton" onclick="checkDatabase()" style="background: #17a2b8;">
            检查数据库状态
        </button>

        <div id="result" style="margin-top: 30px;"></div>
    </div>

    <script>
        const DB_NAME = 'AI_Novel_Workshop';
        const DB_VERSION = 1;
        const PROJECTS_STORE = 'projects';
        const CHAPTERS_STORE = 'chapters';

        function updateStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
        }

        async function checkDatabase() {
            updateStatus('正在检查数据库...', 'info');

            try {
                // 检查数据库是否存在
                const databases = await indexedDB.databases();
                const dbExists = databases.some(db => db.name === DB_NAME);

                if (!dbExists) {
                    updateStatus('❌ 数据库不存在', 'warning');
                    document.getElementById('result').innerHTML = `
                        <div class="steps">
                            <strong>状态：</strong>数据库尚未创建<br>
                            <strong>建议：</strong>刷新项目页面会自动创建数据库
                        </div>
                    `;
                    return;
                }

                // 打开数据库检查结构
                const request = indexedDB.open(DB_NAME, DB_VERSION);

                request.onsuccess = (event) => {
                    const db = event.target.result;
                    const storeNames = Array.from(db.objectStoreNames);

                    let status = '✅ 数据库存在\n';
                    status += '对象存储: ' + storeNames.join(', ') + '\n';

                    if (!storeNames.includes(PROJECTS_STORE)) {
                        status += '\n❌ 缺少 projects 存储';
                    } else {
                        status += '\n✅ projects 存储正常';
                    }

                    if (!storeNames.includes(CHAPTERS_STORE)) {
                        status += '\n❌ 缺少 chapters 存储';
                    } else {
                        status += '\n✅ chapters 存储正常';
                    }

                    updateStatus('检查完成', 'success');
                    document.getElementById('result').innerHTML = `
                        <div class="steps">
                            <pre>${status}</pre>
                        </div>
                    `;

                    db.close();
                };

                request.onerror = () => {
                    updateStatus('❌ 数据库检查失败', 'error');
                };

            } catch (error) {
                updateStatus('❌ 检查失败: ' + error.message, 'error');
            }
        }

        async function fixDatabase() {
            const fixButton = document.getElementById('fixButton');
            fixButton.disabled = true;
            updateStatus('正在修复数据库...', 'info');

            try {
                // 步骤1: 备份数据（如果有）
                updateStatus('步骤 1/4: 检查是否有旧数据...', 'info');
                let oldData = [];

                try {
                    const oldDb = await new Promise((resolve, reject) => {
                        const request = indexedDB.open(DB_NAME, DB_VERSION);
                        request.onsuccess = (e) => resolve(e.target.result);
                        request.onerror = () => reject(new Error('无法打开旧数据库'));
                    });

                    if (oldDb.objectStoreNames.contains(PROJECTS_STORE)) {
                        const tx = oldDb.transaction([PROJECTS_STORE], 'readonly');
                        const store = tx.objectStore(PROJECTS_STORE);
                        oldData = await new Promise((resolve) => {
                            const request = store.getAll();
                            request.onsuccess = () => resolve(request.result);
                        });

                        if (oldData.length > 0) {
                            updateStatus(`发现 ${oldData.length} 个旧项目，正在备份...`, 'warning');
                        }
                    }

                    oldDb.close();
                } catch (e) {
                    console.log('没有旧数据需要备份');
                }

                // 步骤2: 删除旧数据库
                updateStatus('步骤 2/4: 删除旧数据库...', 'info');
                await new Promise((resolve, reject) => {
                    const request = indexedDB.deleteDatabase(DB_NAME);
                    request.onsuccess = () => resolve(true);
                    request.onerror = () => reject(new Error('删除失败'));
                    request.onblocked = () => {
                        updateStatus('数据库被锁定，请关闭所有项目页面后重试', 'error');
                        reject(new Error('数据库被锁定'));
                    };
                });

                // 步骤3: 创建新数据库
                updateStatus('步骤 3/4: 创建新数据库...', 'info');
                const newDb = await new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);

                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;

                        // 创建 projects 存储
                        if (!db.objectStoreNames.contains(PROJECTS_STORE)) {
                            db.createObjectStore(PROJECTS_STORE, { keyPath: 'id' });
                            console.log('创建 projects 存储');
                        }

                        // 创建 chapters 存储
                        if (!db.objectStoreNames.contains(CHAPTERS_STORE)) {
                            const chaptersStore = db.createObjectStore(CHAPTERS_STORE, { keyPath: 'id' });
                            chaptersStore.createIndex('projectId', 'projectId', { unique: false });
                            console.log('创建 chapters 存储');
                        }
                    };

                    request.onsuccess = (e) => resolve(e.target.result);
                    request.onerror = () => reject(new Error('创建数据库失败'));
                });

                // 步骤4: 恢复数据
                if (oldData.length > 0) {
                    updateStatus(`步骤 4/4: 恢复 ${oldData.length} 个项目...`, 'info');

                    const tx = newDb.transaction([PROJECTS_STORE], 'readwrite');
                    const store = tx.objectStore(PROJECTS_STORE);

                    for (const project of oldData) {
                        store.put(project);
                    }

                    await new Promise((resolve, reject) => {
                        tx.oncomplete = () => resolve(true);
                        tx.onerror = () => reject(new Error('数据恢复失败'));
                    });
                } else {
                    updateStatus('步骤 4/4: 无需恢复数据', 'info');
                }

                newDb.close();

                // 完成
                updateStatus('✅ 数据库修复完成！', 'success');
                document.getElementById('result').innerHTML = `
                    <div class="steps">
                        <strong>修复完成！</strong><br><br>
                        <ol>
                            <li>已删除损坏的数据库</li>
                            <li>已创建新的数据库结构</li>
                            <li>已恢复 ${oldData.length} 个项目数据</li>
                        </ol>
                        <br>
                        <button onclick="window.open('http://localhost:3000/', '_blank')">
                            返回项目列表
                        </button>
                    </div>
                `;

            } catch (error) {
                updateStatus('❌ 修复失败: ' + error.message, 'error');
                document.getElementById('result').innerHTML = `
                    <div class="steps" style="background: #f8d7da; color: #721c24;">
                        <strong>修复失败</strong><br>
                        错误信息: ${error.message}<br><br>
                        <strong>手动修复步骤：</strong>
                        <ol>
                            <li>关闭所有项目页面（localhost:3000）</li>
                            <li>打开浏览器开发者工具（F12）</li>
                            <li>切换到 Application 标签</li>
                            <li>找到 Storage → IndexedDB</li>
                            <li>右键点击 "AI_Novel_Workshop" → 删除</li>
                            <li>刷新项目页面重新创建数据库</li>
                        </ol>
                    </div>
                `;
            } finally {
                fixButton.disabled = false;
            }
        }

        // 页面加载时自动检查
        window.addEventListener('load', checkDatabase);
    </script>
</body>
</html>
