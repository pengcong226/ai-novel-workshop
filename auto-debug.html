<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>项目自动诊断</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }
        .container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #667eea;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        h2 {
            color: #764ba2;
            margin-top: 30px;
        }
        .info-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
            border-left: 4px solid #667eea;
        }
        .success {
            background: #d4edda;
            border-left-color: #28a745;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            border-left-color: #dc3545;
            color: #721c24;
        }
        .warning {
            background: #fff3cd;
            border-left-color: #ffc107;
            color: #856404;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .project-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin: 15px 0;
        }
        .project-card.target {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            margin: 0 5px;
        }
        .badge-success { background: #28a745; color: white; }
        .badge-error { background: #dc3545; color: white; }
        .badge-warning { background: #ffc107; color: #333; }
        code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            color: #d63384;
        }
        .action-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
            transition: transform 0.2s;
        }
        .action-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 AI小说工坊 - 自动诊断工具</h1>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>正在自动检测项目数据...</p>
        </div>

        <div id="results" style="display:none;">
            <h2>📊 诊断结果</h2>
            <div id="store-status"></div>

            <h2>💾 IndexedDB 数据</h2>
            <div id="indexeddb-status"></div>

            <h2>🎯 目标项目检查</h2>
            <div id="target-project"></div>

            <h2>🔧 问题诊断</h2>
            <div id="diagnosis"></div>

            <h2>💡 解决方案</h2>
            <div id="solution"></div>
        </div>
    </div>

    <script>
        const TARGET_PROJECT_ID = '3774e929-c917-4992-87f0-0a78f87fa662';

        async function autoDiagnose() {
            try {
                // 1. 检查 Pinia Store
                const storeStatus = document.getElementById('store-status');
                if (window.projectStore) {
                    const projects = window.projectStore.projects?.value || [];
                    const currentProject = window.projectStore.currentProject?.value;
                    const loading = window.projectStore.loading?.value;
                    const error = window.projectStore.error?.value;

                    storeStatus.innerHTML = `
                        <div class="info-box success">
                            <strong>✅ Pinia Store 已找到</strong><br>
                            项目列表数量: <code>${projects.length}</code><br>
                            当前项目: <code>${currentProject ? currentProject.title : 'null'}</code><br>
                            加载状态: <code>${loading}</code><br>
                            错误信息: <code>${error || '无'}</code>
                        </div>
                    `;
                } else {
                    storeStatus.innerHTML = `
                        <div class="info-box error">
                            <strong>❌ Pinia Store 未找到</strong><br>
                            请在项目页面（http://localhost:3000/project/...）打开此诊断工具
                        </div>
                    `;
                }

                // 2. 检查 IndexedDB
                const indexedDBStatus = document.getElementById('indexeddb-status');
                const db = await new Promise((resolve, reject) => {
                    const request = indexedDB.open('AI_Novel_Workshop', 1);
                    request.onsuccess = (e) => resolve(e.target.result);
                    request.onerror = () => reject(new Error('无法打开 IndexedDB'));
                });

                const projects = await new Promise((resolve) => {
                    const tx = db.transaction(['projects'], 'readonly');
                    const store = tx.objectStore('projects');
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                });

                indexedDBStatus.innerHTML = `
                    <div class="info-box success">
                        <strong>✅ IndexedDB 连接成功</strong><br>
                        找到 <code>${projects.length}</code> 个项目
                    </div>
                `;

                if (projects.length > 0) {
                    indexedDBStatus.innerHTML += `
                        <h3 style="margin-top: 20px;">项目列表：</h3>
                    `;
                    projects.forEach((project, index) => {
                        const isTarget = project.id === TARGET_PROJECT_ID;
                        indexedDBStatus.innerHTML += `
                            <div class="project-card ${isTarget ? 'target' : ''}">
                                <strong>${index + 1}. ${project.title || '未命名项目'}</strong>
                                ${isTarget ? '<span class="badge badge-success">目标项目</span>' : ''}<br>
                                <small style="color: #666;">ID: <code>${project.id}</code></small><br>
                                类型: <code>${project.genre || '未设置'}</code> |
                                字数: <code>${project.currentWords || 0} / ${project.targetWords || 0}</code><br>
                                世界观: ${project.world ? '<span class="badge badge-success">已设置</span>' : '<span class="badge badge-error">未设置</span>'}
                                人物: ${project.characters && project.characters.length ? '<span class="badge badge-success">' + project.characters.length + '个</span>' : '<span class="badge badge-warning">0个</span>'}
                                章节: ${project.chapters && project.chapters.length ? '<span class="badge badge-success">' + project.chapters.length + '章</span>' : '<span class="badge badge-warning">0章</span>'}
                            </div>
                        `;
                    });
                } else {
                    indexedDBStatus.innerHTML = `
                        <div class="info-box error">
                            <strong>⚠️ IndexedDB 中没有项目数据</strong><br>
                            需要先创建项目
                        </div>
                    `;
                }

                // 3. 检查目标项目
                const targetProjectDiv = document.getElementById('target-project');
                const targetProject = await new Promise((resolve) => {
                    const tx = db.transaction(['projects'], 'readonly');
                    const store = tx.objectStore('projects');
                    const request = store.get(TARGET_PROJECT_ID);
                    request.onsuccess = () => resolve(request.result);
                });

                if (targetProject) {
                    targetProjectDiv.innerHTML = `
                        <div class="info-box success">
                            <strong>✅ 目标项目已找到</strong><br>
                            标题: <code>${targetProject.title}</code><br>
                            ID: <code>${targetProject.id}</code><br>
                            类型: <code>${targetProject.genre || '未设置'}</code><br>
                            目标字数: <code>${targetProject.targetWords || 0}</code><br>
                            当前字数: <code>${targetProject.currentWords || 0}</code><br>
                            世界观: ${targetProject.world ? '✅ 已设置' : '❌ 未设置'}<br>
                            人物: ${targetProject.characters ? targetProject.characters.length + '个' : '0个'}<br>
                            章节: ${targetProject.chapters ? targetProject.chapters.length + '章' : '0章'}
                        </div>
                    `;
                } else {
                    targetProjectDiv.innerHTML = `
                        <div class="info-box error">
                            <strong>❌ 目标项目未找到</strong><br>
                            项目ID: <code>${TARGET_PROJECT_ID}</code><br>
                            该项目可能已被删除或ID不正确
                        </div>
                    `;
                }

                // 4. 问题诊断
                const diagnosisDiv = document.getElementById('diagnosis');
                const issues = [];

                if (!window.projectStore) {
                    issues.push('Pinia Store 未找到 - 请在项目页面打开此工具');
                } else if (!window.projectStore.currentProject?.value) {
                    issues.push('当前项目为 null - 项目未正确加载到 Store');
                }

                if (projects.length === 0) {
                    issues.push('IndexedDB 中没有项目数据 - 需要创建项目');
                } else if (!targetProject) {
                    issues.push('目标项目在 IndexedDB 中不存在');
                } else if (!window.projectStore?.currentProject?.value && targetProject) {
                    issues.push('IndexedDB 有数据但 Store 未加载 - 加载逻辑有问题');
                }

                if (issues.length === 0) {
                    diagnosisDiv.innerHTML = `
                        <div class="info-box success">
                            <strong>✅ 未发现问题</strong><br>
                            所有检查均通过
                        </div>
                    `;
                } else {
                    diagnosisDiv.innerHTML = `
                        <div class="info-box error">
                            <strong>发现 ${issues.length} 个问题：</strong><br>
                            <ul>
                                ${issues.map(issue => `<li>${issue}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                }

                // 5. 解决方案
                const solutionDiv = document.getElementById('solution');
                if (issues.length > 0) {
                    if (!window.projectStore) {
                        solutionDiv.innerHTML = `
                            <div class="info-box warning">
                                <strong>方案 1: 在项目页面打开此工具</strong><br>
                                <button class="action-button" onclick="window.open('http://localhost:3000/project/${TARGET_PROJECT_ID}', '_blank')">
                                    打开项目页面
                                </button>
                            </div>
                        `;
                    } else if (!window.projectStore.currentProject?.value && targetProject) {
                        solutionDiv.innerHTML = `
                            <div class="info-box warning">
                                <strong>方案 2: 手动重新加载项目</strong><br>
                                <button class="action-button" onclick="reloadProject()">
                                    重新加载项目
                                </button>
                            </div>
                            <div class="info-box warning" style="margin-top: 15px;">
                                <strong>方案 3: 返回项目列表重新打开</strong><br>
                                <button class="action-button" onclick="window.open('http://localhost:3000/', '_blank')">
                                    返回项目列表
                                </button>
                            </div>
                        `;
                    } else if (projects.length === 0 || !targetProject) {
                        solutionDiv.innerHTML = `
                            <div class="info-box warning">
                                <strong>方案: 创建新项目</strong><br>
                                <button class="action-button" onclick="window.open('http://localhost:3000/', '_blank')">
                                    前往项目列表创建
                                </button>
                            </div>
                        `;
                    }
                } else {
                    solutionDiv.innerHTML = `
                        <div class="info-box success">
                            <strong>✅ 项目正常运行</strong><br>
                            无需任何操作
                        </div>
                    `;
                }

                // 显示结果
                document.getElementById('loading').style.display = 'none';
                document.getElementById('results').style.display = 'block';

            } catch (error) {
                document.getElementById('loading').innerHTML = `
                    <div class="info-box error">
                        <strong>❌ 诊断失败</strong><br>
                        错误: ${error.message}<br><br>
                        请确保在项目页面（http://localhost:3000）打开此诊断工具
                    </div>
                `;
            }
        }

        async function reloadProject() {
            if (window.projectStore) {
                try {
                    await window.projectStore.openProject(TARGET_PROJECT_ID);
                    alert('✅ 项目重新加载成功！\n页面将刷新...');
                    location.reload();
                } catch (error) {
                    alert('❌ 加载失败: ' + error.message);
                }
            }
        }

        // 页面加载完成后自动运行
        window.addEventListener('load', autoDiagnose);
    </script>
</body>
</html>
