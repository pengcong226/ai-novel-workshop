<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>自动创建测试项目</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        h1 {
            color: #667eea;
            margin-bottom: 30px;
        }
        .step {
            background: #f5f5f5;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            text-align: left;
        }
        .step-title {
            font-weight: bold;
            color: #667eea;
        }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .warning { color: #ffc107; }
        .info { color: #17a2b8; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            margin: 10px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 自动修复与测试工具</h1>

        <div id="status">
            点击下方按钮开始自动修复和测试
        </div>

        <div id="steps"></div>

        <div id="actions">
            <button onclick="autoFix()">开始自动修复</button>
        </div>
    </div>

    <script>
        const DB_NAME = 'AI_Novel_Workshop';
        const DB_VERSION = 1;
        const PROJECTS_STORE = 'projects';

        function log(message, type = 'info') {
            const stepsDiv = document.getElementById('steps');
            const stepDiv = document.createElement('div');
            stepDiv.className = 'step';
            stepDiv.innerHTML = `<span class="${type}">${message}</span>`;
            stepsDiv.appendChild(stepDiv);
            window.scrollTo(0, document.body.scrollHeight);
        }

        async function autoFix() {
            const actionsDiv = document.getElementById('actions');
            actionsDiv.innerHTML = '<div class="spinner"></div><p>正在处理...</p>';

            try {
                // 步骤1: 检查数据库
                log('步骤 1/5: 检查数据库结构...', 'info');
                const db = await new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onsuccess = (e) => resolve(e.target.result);
                    request.onerror = () => reject(new Error('无法打开数据库'));
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(PROJECTS_STORE)) {
                            db.createObjectStore(PROJECTS_STORE, { keyPath: 'id' });
                            log('✅ 创建 projects 对象存储', 'success');
                        }
                    };
                });

                const storeNames = Array.from(db.objectStoreNames);
                log(`数据库对象存储: ${storeNames.join(', ')}`, 'success');

                // 步骤2: 检查现有项目
                log('步骤 2/5: 检查现有项目...', 'info');
                const existingProjects = await new Promise((resolve) => {
                    const tx = db.transaction([PROJECTS_STORE], 'readonly');
                    const store = tx.objectStore(PROJECTS_STORE);
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                });

                log(`找到 ${existingProjects.length} 个现有项目`, existingProjects.length > 0 ? 'success' : 'warning');

                // 步骤3: 创建测试项目
                log('步骤 3/5: 创建测试项目...', 'info');
                const testProject = {
                    id: 'test-' + Date.now(),
                    title: '测试项目 ' + new Date().toLocaleString(),
                    description: '这是一个自动创建的测试项目',
                    genre: '玄幻',
                    targetWords: 100000,
                    currentWords: 0,
                    status: 'draft',
                    createdAt: new Date(),
                    updatedAt: new Date(),
                    world: {
                        id: 'world-' + Date.now(),
                        name: '',
                        era: { time: '', techLevel: '', socialForm: '' },
                        geography: { locations: [] },
                        factions: [],
                        rules: [],
                        aiGenerated: false
                    },
                    characters: [],
                    outline: {
                        id: 'outline-' + Date.now(),
                        synopsis: '',
                        theme: '',
                        mainPlot: { id: 'plot-' + Date.now(), name: '主线', description: '' },
                        subPlots: [],
                        volumes: [],
                        chapters: [],
                        foreshadowings: []
                    },
                    chapters: [],
                    config: {
                        preset: 'standard',
                        planningModel: 'gpt-4-turbo',
                        writingModel: 'gpt-3.5-turbo',
                        checkingModel: 'gpt-3.5-turbo',
                        planningDepth: 'medium',
                        writingDepth: 'standard',
                        enableQualityCheck: true,
                        qualityThreshold: 7,
                        maxCostPerChapter: 0.15,
                        enableAISuggestions: true
                    }
                };

                log(`测试项目ID: ${testProject.id}`, 'info');

                // 步骤4: 保存项目
                log('步骤 4/5: 保存项目到 IndexedDB...', 'info');
                await new Promise((resolve, reject) => {
                    const tx = db.transaction([PROJECTS_STORE], 'readwrite');
                    const store = tx.objectStore(PROJECTS_STORE);
                    const request = store.put(testProject);

                    request.onsuccess = () => {
                        log('✅ 项目保存成功', 'success');
                        resolve(true);
                    };
                    request.onerror = () => {
                        log('❌ 项目保存失败', 'error');
                        reject(new Error('保存失败'));
                    };
                    tx.oncomplete = () => resolve(true);
                    tx.onerror = () => reject(new Error('事务失败'));
                });

                // 步骤5: 验证保存
                log('步骤 5/5: 验证项目保存...', 'info');
                const savedProject = await new Promise((resolve) => {
                    const tx = db.transaction([PROJECTS_STORE], 'readonly');
                    const store = tx.objectStore(PROJECTS_STORE);
                    const request = store.get(testProject.id);
                    request.onsuccess = () => resolve(request.result);
                });

                if (savedProject) {
                    log('✅ 项目已成功保存到 IndexedDB', 'success');
                    log(`项目标题: ${savedProject.title}`, 'success');
                    log(`项目ID: ${savedProject.id}`, 'info');

                    const allProjects = await new Promise((resolve) => {
                        const tx = db.transaction([PROJECTS_STORE], 'readonly');
                        const store = tx.objectStore(PROJECTS_STORE);
                        const request = store.getAll();
                        request.onsuccess = () => resolve(request.result);
                    });

                    log(`\n总计 ${allProjects.length} 个项目`, 'success');

                    db.close();

                    document.getElementById('status').innerHTML = `
                        <div style="background: #d4edda; color: #155724; padding: 20px; border-radius: 5px; margin: 20px 0;">
                            <h2 style="margin: 0 0 10px 0;">✅ 修复成功！</h2>
                            <p>IndexedDB 已正常工作</p>
                            <p>已创建测试项目</p>
                        </div>
                    `;

                    actionsDiv.innerHTML = `
                        <button onclick="window.open('http://localhost:3000/', '_blank')">
                            返回项目列表查看测试项目
                        </button>
                        <button onclick="window.open('http://localhost:3000/project/${testProject.id}', '_blank')">
                            直接打开测试项目
                        </button>
                        <button onclick="location.reload()">
                            再次测试
                        </button>
                    `;
                } else {
                    throw new Error('项目保存后无法读取');
                }

            } catch (error) {
                log(`\n❌ 错误: ${error.message}`, 'error');

                document.getElementById('status').innerHTML = `
                    <div style="background: #f8d7da; color: #721c24; padding: 20px; border-radius: 5px; margin: 20px 0;">
                        <h2 style="margin: 0 0 10px 0;">❌ 修复失败</h2>
                        <p>${error.message}</p>
                    </div>
                `;

                actionsDiv.innerHTML = `
                    <button onclick="location.reload()">重试</button>
                    <button onclick="window.open('http://localhost:3000/', '_blank')">
                        返回项目列表
                    </button>
                `;
            }
        }

        // 页面加载时自动运行
        window.addEventListener('load', () => {
            document.getElementById('status').innerHTML = `
                <div style="background: #d1ecf1; color: #0c5460; padding: 20px; border-radius: 5px;">
                    <p><strong>此工具将自动：</strong></p>
                    <ol style="text-align: left;">
                        <li>检查 IndexedDB 数据库结构</li>
                        <li>检查现有项目数据</li>
                        <li>创建一个测试项目</li>
                        <li>验证保存功能</li>
                        <li>提供测试项目链接</li>
                    </ol>
                </div>
            `;
        });
    </script>
</body>
</html>
